name: "Automagically Assign PR Reviewers"
description: "Automagically assigns reviewers based on current workload and recent activity"
author: "Joxtacy"

inputs:
  github_token:
    description: "GitHub token for API access (use secrets.GITHUB_TOKEN)"
    required: true
  team_members:
    description: 'Comma-separated list of GitHub usernames (e.g., "alice,bob,charlie"). Optional if team_slug is set; the two are combined.'
    required: false
  team_slug:
    description: "Slug of an org team whose members are the reviewer pool (e.g. \"backend\"). Requires a token with org read access (read:org / members:read) — the default GITHUB_TOKEN cannot read team membership. Combined with team_members if both are set."
    required: false
  exclude:
    description: 'Comma-separated GitHub usernames to exclude from the reviewer pool (e.g. a manager who does not review). Applied after combining team_slug and team_members.'
    required: false
  weight_open_prs:
    description: "Weight multiplier for number of open PRs currently assigned (default: 10)"
    required: false
    default: "10"
  weight_lines_per_100:
    description: "Weight multiplier for lines of code per 100 lines in open reviews (default: 1)"
    required: false
    default: "1"
  weight_recent_reviews:
    description: "Weight multiplier for PRs reviewed in last 7 days (default: 3)"
    required: false
    default: "3"
  number_of_reviewers:
    description: "Number of reviewers to assign (default: 1)"
    required: false
    default: "1"

runs:
  using: "docker"
  image: "docker://ghcr.io/joxtacy/auto-assign-reviewers:latest"

branding:
  icon: "users"
  color: "blue"
