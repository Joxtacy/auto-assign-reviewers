# Example workflow file for your project repository
# Save this as: .github/workflows/auto-assign.yml

name: Auto Assign Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  assign:
    runs-on: ubuntu-latest
    # Only run if no reviewers are already assigned
    if: github.event.pull_request.requested_reviewers[0] == null

    steps:
      - name: Assign Reviewer
        uses: Joxtacy/auto-assign-reviewers@v0.1.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          team_members: "alice,bob,charlie" # Update with your team
          # Or draw the pool from an org team (combined with team_members if both set).
          # Requires a token with org read access — the default GITHUB_TOKEN can't
          # read team membership. Pass a PAT (read:org) or App token instead:
          #   github_token: ${{ secrets.REVIEWER_ASSIGN_TOKEN }}
          #   team_slug: "backend"
          # Optional: drop people who shouldn't be assigned (e.g. your manager)
          # exclude: "the-manager"
          # Optional: customize weights
          weight_open_prs: 10
          weight_lines_per_100: 1
          weight_recent_reviews: 3
          number_of_reviewers: 1
